{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}{{ app_name|default:"GradeSync" }}{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet"
    >
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{% static 'app/styles.css' %}">
</head>
<body>
    <div class="page-shell">
        <header class="topbar">
            <a class="logo" href="{% url 'app:home' %}" aria-label="Ir para a base do sistema">
                <span class="logo-badge">
                    <i class="fa-solid fa-graduation-cap"></i>
                </span>
                <span>{{ app_name|default:"GradeSync" }}</span>
            </a>

            <a class="logout" href="{% url 'admin:index' %}" aria-label="Abrir area administrativa">
                <i class="fa-solid fa-right-from-bracket"></i>
                Admin
            </a>
        </header>

        <main class="container">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
