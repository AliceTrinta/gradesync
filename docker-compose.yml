services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: gradesync
      POSTGRES_USER: gradesync
      POSTGRES_PASSWORD: gradesync
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gradesync -d gradesync"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    command: sh -lc "python manage.py migrate --noinput && python manage.py runserver 0.0.0.0:8000"
    environment:
      DJANGO_SECRET_KEY: dev-only-secret-key
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0
      POSTGRES_DB: gradesync
      POSTGRES_USER: gradesync
      POSTGRES_PASSWORD: gradesync
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
